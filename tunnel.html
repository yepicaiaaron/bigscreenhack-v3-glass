<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebGL Lens Push Test</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            background-color: #020617;
            overflow-x: hidden;
            font-family: 'Inter', sans-serif;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            pointer-events: none;
        }

        .scroll-container {
            height: 600vh; /* Creates the scrollbar */
            position: relative;
            z-index: 2;
        }

        .scroll-indicator {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            color: #bae6fd;
            z-index: 10;
            text-align: center;
            font-size: 0.9rem;
            letter-spacing: 4px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* Final landing text */
        .landing-content {
            position: absolute;
            bottom: 10vh; /* placed at the bottom of the scroll container */
            width: 100%;
            text-align: center;
            color: white;
            opacity: 0;
        }
        .landing-content h1 {
            font-size: 4rem;
            margin-bottom: 10px;
            text-shadow: 0 0 40px rgba(56, 189, 248, 0.8);
        }
    </style>
</head>
<body>

    <div class="scroll-indicator">SCROLL TO ENTER</div>
    <canvas id="webgl"></canvas>
    
    <div class="scroll-container">
        <div class="landing-content" id="landing">
            <h1>WHERE CODE MEETS CINEMA</h1>
            <p style="color: #bae6fd; letter-spacing: 2px;">WELCOME TO THE NEXT EVOLUTION</p>
        </div>
    </div>

    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <script>
        gsap.registerPlugin(ScrollTrigger);

        // 1. Three.js Setup
        const canvas = document.getElementById('webgl');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x020617, 0.0006); // Deep space fog

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 10000);
        camera.position.z = 1000;

        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

        // Handle Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // 2. Create the "Hole" Typography Textures
        // We render text to an offscreen canvas and cut it out
        const words = ["THE", "BIG", "SCREEN", "HACK"];
        const planesGroup = new THREE.Group();
        scene.add(planesGroup);

        words.forEach((word, index) => {
            // Create 2D Canvas
            const size = 2048;
            const ctxCanvas = document.createElement('canvas');
            ctxCanvas.width = size;
            ctxCanvas.height = size;
            const ctx = ctxCanvas.getContext('2d');

            // Draw solid background
            ctx.fillStyle = '#0f172a'; // Match scene background
            ctx.fillRect(0, 0, size, size);

            // Cut out the text
            ctx.globalCompositeOperation = 'destination-out';
            ctx.font = '900 350px "Impact", "Arial Black", sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(word, size / 2, size / 2);

            // Create Three.js Texture
            const texture = new THREE.CanvasTexture(ctxCanvas);
            texture.minFilter = THREE.LinearFilter;

            // Create Plane Geometry
            const geometry = new THREE.PlaneGeometry(size, size);

            // Stack 8 planes to give the text "thickness" (a tunnel effect)
            const zPosition = index * -1500; // Space out the words
            
            for(let j = 0; j < 15; j++) {
                const material = new THREE.MeshBasicMaterial({
                    map: texture,
                    transparent: true,
                    opacity: 0.9 - (j * 0.05), // Fade the deeper layers
                    color: new THREE.Color().setHSL(0.55, 0.8, 0.6 - (j * 0.03)) // Darken deeper layers
                });
                
                const plane = new THREE.Mesh(geometry, material);
                plane.position.z = zPosition - (j * 30); // 30px gap between layers
                planesGroup.add(plane);
            }
        });

        // 3. Add ambient dust/particles for sense of speed
        const particleGeo = new THREE.BufferGeometry();
        const particleCount = 3000;
        const posArray = new Float32Array(particleCount * 3);

        for(let i = 0; i < particleCount * 3; i++) {
            posArray[i] = (Math.random() - 0.5) * 5000;
        }
        particleGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const particleMat = new THREE.PointsMaterial({
            size: 4,
            color: 0xbae6fd,
            transparent: true,
            opacity: 0.6
        });
        const particles = new THREE.Points(particleGeo, particleMat);
        scene.add(particles);

        // 4. Render Loop
        let mouseX = 0;
        let mouseY = 0;
        
        document.addEventListener('mousemove', (e) => {
            mouseX = (e.clientX / window.innerWidth) * 2 - 1;
            mouseY = -(e.clientY / window.innerHeight) * 2 + 1;
        });

        function animate() {
            requestAnimationFrame(animate);
            
            // Subtle camera drift based on mouse
            camera.position.x += (mouseX * 100 - camera.position.x) * 0.05;
            camera.position.y += (mouseY * 100 - camera.position.y) * 0.05;
            
            // Slowly rotate particles
            particles.rotation.z -= 0.0005;

            renderer.render(scene, camera);
        }
        animate();

        // 5. GSAP ScrollTrigger Logic
        // Fly camera forward through the Z axis
        gsap.to(camera.position, {
            z: -5500, // Fly past the last word ("HACK" is at -4500)
            ease: "none",
            scrollTrigger: {
                trigger: ".scroll-container",
                start: "top top",
                end: "bottom bottom",
                scrub: 1.5 // Smooth scrubbing
            }
        });

        // Fade in landing text at the very end
        gsap.to("#landing", {
            opacity: 1,
            y: -50,
            ease: "power2.out",
            scrollTrigger: {
                trigger: ".scroll-container",
                start: "85% top", // Start fading in near the bottom
                end: "bottom bottom",
                scrub: true
            }
        });
        
        // Hide scroll indicator once scrolled
        gsap.to(".scroll-indicator", {
            opacity: 0,
            scrollTrigger: {
                trigger: ".scroll-container",
                start: "2% top",
                end: "5% top",
                scrub: true
            }
        });
    </script>
</body>
</html>
